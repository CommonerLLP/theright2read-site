<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evidence — The Right to Read</title>
<meta name="description" content="Self-hosted, embeddable data visualisations for the Right to Read campaign. Every chart is a permalink; drop it into a page or a post by iframe.">
<!--
  theright2read.org/evidence — self-hosted, iframe-embeddable proof surface.
  Processed charts/lookups (data/ is raw corpus; this is the evidence distilled
  from it). Subtree of theright2read; served on GitHub Pages at /evidence/
  (host-agnostic: hash routing works at any base path or a future subdomain).
  Design mirrors the site v2 design language (assets/tokens.css). Two renderers
  keyed off chart JSON: vanilla-SVG/canvas for signature pamphlet charts, ECharts
  (Apache-2.0, lazy-loaded) for maps/dense charts. NO green (game-signal only).
-->
<script src="/assets/theme.js?v=96"></script>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="../assets/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=PT+Mono&family=Inter+Tight:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens.css?v=96">
<style>
  /* chart colour aliases consumed by the SVG/canvas code — tokens.css has no
     --blue/--red-2/--grid-off, so define them here (and remap per theme). */
  :root { --blue: var(--rtr-blue); --red-2: var(--rtr-red-2); --grid-off: #e6e0d4; }
  :root[data-theme="dark"] { --blue: #7b95cf; --red-2: #d05661; --grid-off: #39332b; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --blue: #7b95cf; --red-2: #d05661; --grid-off: #39332b; }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--font-serif); font-size: var(--t-body); line-height: 1.6;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: var(--maxw-read); margin: 0 auto; padding: 0 1.15rem; }

  /* app bar — compact, small logo (focus stays on the analytical content) */
  #appbar {
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    max-width: var(--maxw-read); margin: 0 auto; padding: .65rem 1.15rem;
    border-bottom: 1px solid var(--rule);
  }
  #appbar a.brand { display: flex; align-items: center; gap: .5rem; text-decoration: none; }
  #appbar a.brand img { height: 34px; width: auto; display: block; }
  #appbar a.brand .lbl {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .12em;
    font-size: .7rem; color: var(--accent);
  }
  .btns { display: flex; gap: .5rem; }
  .btn {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em;
    font-size: .64rem; cursor: pointer; background: transparent; color: var(--text);
    border: 1px solid var(--rule); border-radius: var(--radius); padding: .34rem .66rem;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  main { padding: 1.6rem 0 2.4rem; }

  /* figure card */
  figure {
    margin: 0 0 1.4rem; background: var(--surface); border: 1px solid var(--rule);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .fig-pad { padding: 1.05rem 1rem 1.2rem; }
  .fig-kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .1em;
    font-size: .66rem; color: var(--accent); margin: 0 0 .3rem;
  }
  .fig-title {
    font-family: var(--font-display); font-weight: 700; font-size: 1.5rem;
    line-height: 1.1; margin: 0 0 1rem; color: var(--text);
  }
  figcaption {
    font-family: var(--font-serif); font-size: .92rem; line-height: 1.5;
    color: var(--text-muted); margin-top: 1rem;
  }
  figcaption b { color: var(--text); font-weight: 600; }
  .fig-src {
    font-family: var(--font-mono); font-size: .64rem; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-muted); margin-top: .7rem;
    padding-top: .6rem; border-top: 1px solid var(--rule);
  }
  .fig-cite {
    font-family: var(--font-mono); font-size: .6rem; line-height: 1.45;
    color: var(--text-muted); margin-top: .5rem;
  }
  .hit { cursor: pointer; }
  .hit:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* index list */
  .idx-title { font-family: var(--font-display); font-weight: 700; font-size: var(--t-h2); margin: .2rem 0 1.2rem; }
  ul.idx { list-style: none; margin: 0; padding: 0; }
  ul.idx li { border-bottom: 1px solid var(--rule); }
  ul.idx a {
    display: flex; align-items: center; gap: .8rem;
    padding: .9rem .2rem; min-height: 44px; text-decoration: none; color: var(--text);
  }
  ul.idx a:hover .t, ul.idx a:hover .go { color: var(--accent); }
  ul.idx .t { flex: 1; font-family: var(--font-ui); font-weight: 700; }
  ul.idx .s { font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); white-space: nowrap; }
  ul.idx .go { font-family: var(--font-mono); font-size: 1rem; color: var(--text-muted); transition: color .12s, transform .12s; }
  ul.idx a:hover .go { transform: translateX(2px); }

  /* chart-not-found fallback */
  .chart-missing { padding: 1rem 0 2rem; }
  .back-link { display: inline-flex; align-items: center; min-height: 44px; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: .08em; font-size: .68rem; color: var(--accent); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }

  /* tooltip */
  #rtr-tip {
    position: fixed; z-index: 50; pointer-events: none; max-width: 260px;
    background: var(--text); color: var(--bg); font-family: var(--font-ui);
    font-size: .78rem; line-height: 1.4; padding: .5rem .6rem; border-radius: var(--radius);
    box-shadow: var(--shadow); opacity: 0; transition: opacity .12s var(--ease);
    transform: translate(-50%, calc(-100% - 10px));
  }
  #rtr-tip.on { opacity: 1; }
  #rtr-tip b { color: var(--bg); }

  #appfoot {
    max-width: var(--maxw-page); margin: 0 auto; padding: 1.2rem 1.15rem 2rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted);
    display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  #appfoot a { color: var(--text-muted); }

  /* embed mode — strip chrome for iframes */
  body.embed #appbar, body.embed #appfoot { display: none; }
  body.embed main { padding: 0; }
  body.embed #view { max-width: none; }           /* flush full-width in an iframe [codex #21] */
  body.embed .fig-tools { display: none; }         /* no interactive PNG control in embeds [codex #21] */
  body.embed figure { margin: 0; border: none; box-shadow: none; background: transparent; }
  body.embed .embed-cite {
    display: block; font-family: var(--font-mono); font-size: .58rem;
    text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
    text-align: right; margin-top: .4rem;
  }
  .embed-cite { display: none; }

  @media (max-width: 420px) {
    .fig-pad { padding: .95rem .8rem 1rem; }
    .fig-title { font-size: 1.3rem; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <header id="appbar">
    <a class="brand brand-logo" href="https://theright2read.org" aria-label="Right to Read — home">
      <img src="/assets/rtr-logo.svg?v=96" alt="Right to Read"><span class="lbl">Evidence</span>
    </a>
    <div class="btns">
      <button class="btn" onclick="RTRTheme.toggle()" aria-label="Toggle light or dark theme"><span data-theme-label>☀</span> theme</button>
    </div>
  </header>

  <main id="view" class="wrap"><noscript>These charts need JavaScript. Each chart's caption states its finding in full without it.</noscript></main>

  <footer id="appfoot">
    <span>Last updated July 2026</span>
    <a href="https://theright2read.org">theright2read.org &rarr;</a>
  </footer>

  <div id="rtr-tip"></div>

  <script src="./render-svg.js?v=8"></script>
  <script src="./echarts-theme.js?v=5"></script>
  <script src="./render-echarts.js?v=5"></script>
  <script src="./app.js?v=7"></script>
</body>
</html>
