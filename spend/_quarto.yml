project:
  type: default

format:
  html:
    theme: none
    css: ../assets/styles.css
    toc: true
    toc-location: left
    toc-title: "The Analysis"
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Roboto+Slab:wght@400;500;700&display=swap" rel="stylesheet">
  pdf:
    documentclass: article
    classoption: [11pt, oneside]
    geometry:
      - top=20mm
      - bottom=20mm
      - left=25mm
      - right=20mm
    header-includes: |
      \usepackage{fvextra}
      \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,commandchars=\\\{\}}
      \usepackage{sectsty}
      \allsectionsfont{\sffamily}
      \usepackage{fancyhdr}
      \pagestyle{fancy}
      \fancyhf{}
      \fancyhead[L]{Right to Read · Spend Analysis}
      \fancyhead[R]{\thepage}
      \renewcommand{\headrulewidth}{0.4pt}
      \usepackage{xcolor}
      \definecolor{red}{HTML}{DC2A14}
      \definecolor{ink}{HTML}{0E0E0E}
      \definecolor{cream}{HTML}{F1E8D3}

execute:
  echo: false
  warning: false
  message: false
